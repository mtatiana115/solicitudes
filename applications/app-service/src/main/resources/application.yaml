server:
  port: 8081
spring:
  application:
    name: "Solicitudes"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
springdoc:
  api-docs:
    path: "/v3/api-docs"
  swagger-ui:
    path: "/swagger-ui.html"
adapters:
  r2dbc:
    host: "${DB_HOST}"
    port: "${DB_PORT}"
    username: "${DB_USER}"
    password: "${DB_PASSWORD}"
    database: "${DB_NAME}"
adapter:
  restconsumer:
    timeout: 300000
    url: "${URL_AUTHENTICATION_SERVICE}"
  sqs:
    region: "${AWS_REGION}"
    notificationQueueUrl: "${SQS_QUEUE_URL}"
    debtCapacityQueueUrl: "${DEBT_CAPACITY_QUEUE_URL}"
resilience4j:
  circuitbreaker:
    instances:
      existsUserByEmail:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
      findUserByEmail:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
security:
  jwt:
    secret: "${SECRET_KEY}"
    expiration: 3600
entrypoint:
  sqs:
    region: "${AWS_REGION}"
#    endpoint: "http://localhost:4566"
    debtCapacityReplyQueueUrl: "${DEBT_CAPACITY_REPLY_QUEUE_URL}"
    waitTimeSeconds: 20
    maxNumberOfMessages: 10
    visibilityTimeoutSeconds: 10
    numberOfThreads: 1
